name: Deploy HubTuris

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy no servidor Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: hubturis.com.br
          username: opc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/opc/hubturis
            git fetch origin
            git reset --hard origin/main
            npm ci --production=false
            npm run build
            pm2 restart hubturis
            echo "✅ Deploy concluído: $(date)"

      - name: Verificar saúde do site
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hubturis.com.br)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "307" ]; then
            echo "✅ Site respondendo: HTTP $STATUS"
          else
            echo "❌ Site com problema: HTTP $STATUS"
            exit 1
          fi
